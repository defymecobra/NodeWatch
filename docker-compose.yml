version: '3.9'

services:
  db:
    image: postgres:16-alpine
    container_name: nodewatch_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER:-nodewatch}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-nodewatch_secret}
      POSTGRES_DB: ${DB_NAME:-nodewatch_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-nodewatch}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: nodewatch_backend
    restart: unless-stopped
    env_file: .env
    ports:
      - "3000:3000"
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: nodewatch_frontend
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  postgres_data:
